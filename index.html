<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Order - Royal Frames</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #111111;
            --accent: #D4AF37;
            --text: #ffffff;
        }
        body {
            background-color: var(--primary);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 40px;
        }
        .loader {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(212, 175, 55, 0.1);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        i.success-icon {
            font-size: 80px;
            color: #28a745;
            margin-bottom: 30px;
            display: none;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--accent);
        }
        p {
            color: #aaa;
            font-size: 1rem;
            line-height: 1.5;
        }
        .debug {
            margin-top: 40px;
            font-family: monospace;
            font-size: 0.7rem;
            color: #444;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader" id="loader"></div>
        <i class="fas fa-check-circle success-icon" id="successIcon"></i>
        <h1 id="statusText">Processing Your Order...</h1>
        <p id="subText">Please do not refresh or close this window.</p>
        
        <div class="debug" id="debug"></div>
    </div>

    <script>
        const BOT_TOKEN = "8787407024:AAH6ssk4sFf9mbaa7hF9AgNBJbgiZK00U9k";
        const CHAT_ID = "5205449306";

        function log(msg) {
            console.log(msg);
            const debug = document.getElementById('debug');
            debug.style.display = 'block';
            debug.innerHTML += '<div>' + msg + '</div>';
        }

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('order_id');
            const returnUrl = urlParams.get('return_url');
            const isSuccess = urlParams.get('success');

            if (!isSuccess || !orderId) {
                document.getElementById('statusText').innerText = "Invalid Request";
                document.getElementById('subText').innerText = "No order details found.";
                return;
            }

            // Extract order details from localStorage if on same domain (local testing)
            // or use placeholder since we can't read InfinityFree localStorage
            let orderDetailsStr = "Order #" + orderId + " was placed successfully.";
            
            // Attempt to get more details from Telegram if we had them, 
            // but for a silent bypass, we just send a confirmation.
            // Since we passed return_url, we know where to go back.

            try {
                log("Sending Telegram notification...");
                const message = "🔔 *New Order Success Update*\n\n" +
                                "*Order ID:* #" + orderId + "\n" +
                                "*Status:* Processed via Bypass\n\n" +
                                "The user has been redirected back to the main site dashboard.";

                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                const data = await response.json();
                if (data.ok) {
                    log("Telegram sent!");
                } else {
                    log("Telegram error: " + JSON.stringify(data));
                }
            } catch (err) {
                log("Fetch error: " + err.message);
            }

            // Show success briefly before redirect
            document.getElementById('loader').style.display = 'none';
            document.getElementById('successIcon').style.display = 'block';
            document.getElementById('statusText').innerText = "Order Confirmed!";
            document.getElementById('subText').innerText = "Redirecting you back to your dashboard...";

            // Wait 1 second then redirect
            setTimeout(() => {
                if (returnUrl) {
                    window.location.href = decodeURIComponent(returnUrl);
                } else {
                    // Fallback to my-orders if return_url is missing
                    window.location.href = "https://mani8979.github.io/royalframes/"; // This is the current page, not good.
                    // Instead, we just stop.
                    document.getElementById('statusText').innerText = "Missing return link.";
                }
            }, 1200);
        }

        window.onload = init;
    </script>
</body>
</html>
